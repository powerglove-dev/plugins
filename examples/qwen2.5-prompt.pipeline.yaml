# Prerequisites:
#   1. Ollama installed and running: ollama serve
#   2. Model pulled:                 ollama pull qwen3.5
#   3. Plugin installed:             cd plugins/ollama && make install
#
# Run:
#   orcai pipeline run examples/qwen2.5-prompt.pipeline.yaml
#
# Note: uses qwen3.5 — the qwen3.5 model available on this system.
# Update `model: qwen2.5` if you have pulled qwen2.5 instead.

name: qwen3.5-simple-prompt
version: "1.0"

steps:
  - id: generate
    plugin: ollama
    prompt: "You are a helpful assistant. Explain what a BubbleTea TUI application is in two sentences."
    vars:
      model: qwen3.5

  - id: output
    type: output
