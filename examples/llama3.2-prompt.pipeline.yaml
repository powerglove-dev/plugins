# Prerequisites:
#   1. Ollama installed and running: ollama serve
#   2. Model pulled:                 ollama pull llama3.2
#   3. Plugin installed:             cd plugins/ollama && make install
#
# Run:
#   orcai run examples/llama3.2-prompt.pipeline.yaml

name: llama3.2-simple-prompt
version: "1.0"

steps:
  - id: generate
    plugin: ollama
    prompt: "You are a helpful assistant. Explain what ORCAI (an Agentic Bulletin Board System) is in two sentences."
    vars:
      model: llama3.2

  - id: output
    type: output
